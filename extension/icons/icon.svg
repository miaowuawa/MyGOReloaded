<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a6f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ticketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0e0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGrad)"/>

  <!-- 门票主体 -->
  <g transform="translate(64, 64) rotate(-15) translate(-64, -64)">
    <!-- 票身 -->
    <rect x="24" y="34" width="80" height="60" rx="6" ry="6" fill="url(#ticketGrad)"/>

    <!-- 左侧半圆切口 -->
    <circle cx="24" cy="64" r="10" fill="url(#bgGrad)"/>

    <!-- 右侧半圆切口 -->
    <circle cx="104" cy="64" r="10" fill="url(#bgGrad)"/>

    <!-- 虚线分割线 -->
    <line x1="64" y1="38" x2="64" y2="90" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="4,3"/>

    <!-- 左侧文字区域 - 使用path绘制文字避免字体依赖 -->
    <!-- B -->
    <path d="M38 52 L38 60 L42 60 Q44 60 44 58 Q44 56 42 56 L38 56 M42 56 Q45 56 45 54 Q45 52 42 52 Z" fill="#ff6b6b"/>
    <!-- 站 -->
    <rect x="46" y="52" width="8" height="8" fill="none" stroke="#ff6b6b" stroke-width="1"/>
    <line x1="50" y1="52" x2="50" y2="60" stroke="#ff6b6b" stroke-width="1"/>
    <line x1="46" y1="56" x2="54" y2="56" stroke="#ff6b6b" stroke-width="1"/>

    <!-- 会员购 - 简化为方块 -->
    <rect x="38" y="66" width="12" height="4" rx="1" fill="#666"/>
    <rect x="38" y="72" width="8" height="4" rx="1" fill="#666"/>

    <!-- TICKET -->
    <rect x="36" y="80" width="16" height="3" rx="1" fill="#999"/>

    <!-- 右侧二维码模拟 -->
    <rect x="72" y="46" width="24" height="24" rx="2" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
    <rect x="76" y="50" width="8" height="8" fill="#ff6b6b"/>
    <rect x="88" y="50" width="4" height="4" fill="#ff6b6b"/>
    <rect x="76" y="62" width="4" height="4" fill="#ff6b6b"/>
    <rect x="84" y="60" width="8" height="8" fill="#ff6b6b"/>

    <!-- 顶部装饰条 -->
    <rect x="24" y="34" width="80" height="6" rx="3" ry="3" fill="#ff6b6b"/>
  </g>

  <!-- 闪光效果 -->
  <circle cx="34" cy="34" r="4" fill="#ffffff" opacity="0.6"/>
  <circle cx="30" cy="38" r="2" fill="#ffffff" opacity="0.4"/>
</svg>
